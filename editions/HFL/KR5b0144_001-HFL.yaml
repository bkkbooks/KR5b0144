body:
  text: 太上洞玄靈寳宣戒首悔衆罪保護經卷中上卷原缺太上道君曰世俗之人從宿世以來所犯過惡逮至己身童蒙愚癡不解道義不知教法不曉施行不識逆順犯於天禁地忌四時五行隂陽柔剛日月星辰道德神明上則不孝於天地君王父母耆老尊長下則所惡於臣子卑賤蝖飛蠕動積罪累過結成千萬殃考對逮無窮盡時亡筭奪紀不可勝數所犯過惡者當以瞋恚怒罰毒想怨恨爲過以反虜殘病隂賊酷暴爲過以伐殺剋傷毀敗刑戮爲過以侵詐晻弱輕侮服易爲過以佞媚懀愛蠱諂詭人爲過以隂私妬𡜍婬泆驕慢爲過以嗜酒酣飲嘔吐沈溺爲過以權勢侵凌嗊嗃豪傑爲過以貪利䛕諂盜竊拾遺爲過以嗜得惡施慳惜無濟劫死脫亡爲過以威脅智策刺譏擊切爲過以掘陵發塜殘屍露骨爲過以誑詐調謔誣調功伐爲過以妄言訟鬬敗亂迷誤爲過以謗訕聖賢評論毀譽爲過以縱極情慾多態淫泆爲過以身縱恣細濡口貪滋味爲過以言不擇語行不擇道爲過以心不善想目不擇視爲過以耳不擇聲鼻不擇香爲過過惡如是者爲君則無以爲仁爲臣則無以爲忠爲吏則無以爲平爲父則無以爲慈爲子則無以爲孝爲毋則無以爲愛爲兄則無以爲悌爲弟則無以爲順爲友則無以爲廉爲婦則無以爲恭爲男則無以爲良爲女則無以爲貞爲師則無以爲教爲徒則無以爲敬爲上則無以爲訓爲下則無以爲禮爲鄕黨則無以爲讓爲朋友則無以爲信爲宗族則無以爲和爲丈夫則無以爲實爲奴婢則無以爲勤爲修身則無以爲益爲學道則無以爲仙是故治國者不能致太平治家者不能致其吉治身者不能王其壽治業者不能全其功是故道在廣念徳愛蒼生恩及無外潤及無内應殞之人賜之更生罪結之人聽以首悔首悔之者皆當言議送欵竭情寫意六齋十直庚申甲子八節本命入室燒香披陳愆犯則罪無不原過無不除功無不積德無不立道無不感仙無不成若不能依按齋宜之日但當請經供養䢖齋之時及朔望本命之日至心丹苦首悔所犯則其功彌重罪無不赦今以教子勤心宗奉則福田興矣業行立矣天師唯唯伏受命旨太上道君曰凡爲百姓男子女人帝王國王建齋行道法師於高座上爲轉誦此首悔之文若不能諦誦者當依靈寳齋法壇内靖中隨便安置一時一日乃至三日逐物豐儉貧富量之金龍綵色以鎮十方若用科儀當𥙷齋主姓名年紀户口多少令齋主再拜稽百仰三自搏伏地叩頭法師當於高座爲其誦悔過之文首寫主人存亡罪失則功感諸天罪滅九隂福德歸流恩祐斯降眞氣來下存亡兩散人鬼俱解其功無量仙道成就魔王敬禮門户清肅鬼妖不忓功德之大莫復是勝今以授子善寳之焉天師稽首敬受教誡眞人曰誦首悔之文當作經音誦之第一再拜稽首叩頭仰三自搏法師頌言上啓太上無極大道三寳尊神州縣鄉里男女官某乙行年戶口若干人今因齋次披解上世宿罪重過乞願至眞願降法澤賜以大慈原宥衆生及今齋主先世九玄七祖下及五服六親或爲人君長吏治行多違政教不平少公多私苟貪財色發賦不均教人刺譏訪作盲文伺察非辜吹毛求瑕多冐販䝻店肆賣買遏遮四路割賤奪貴農桑盛要役奪時務囚吉放凶輕原禍惡重刑福業阿䛕所親翦戮良賢逐寵盛傑殘虐弱賤放縱狼吏犲佐虎將熊士晝息夜飲六畜暴死蠶食百姓侵剋所統贓負積兆罪過累億爲君不賢爲臣不忠爲吏不廉在公不清貞在私不直方忤亂正法曲從其心狂筆巧文迷誤視聽受人賄貨縱死殺生或誘罪納貨正筆不貸或恐懼無罪强取寳物或篡弑叛逆誅男略女收婢攝奴撾歐直正鞭撻無罪傷害無愆伏誅無辜或劫抄虜掠凌奪人物七寳五綵六畜孳牲或無辜動衆興軍戰伐驅今生民投之死地孤魂絶域汗血涌流屍鬼哀哀叢林之側窮魂最最九泉之下生者稱苦怨聲聞天死者抱恨訟訴九隂冤對之交考過相連或攻伐國家殘酷無端或弋獵衆生殞殺含氣飛鷹走犬食啖其肉殞胎剥卵羅藏網匿盪射繳刺惡心凶意不仁不義或酖酒漏腐毒餌内藥勸人食之五心内爛危没人命或因恃貴高自怙富室自方雲日欺薄倫類寄意霄外愚謂貴富長久歷世毀詬至眞疑笑道士調弄眞人自伐本根京罪兆過不可復勝諸如此等死受罪對殃流後世致使凡夫仕宦不遷爲居衰貧口數耗減疾病流連或胤息不保男女夭年產業隤微不係祖先生縁不豐不免飢寒凡百無可言宣失次皆由所犯過惡如是今爲存亡悔之伏願天尊唯垂原除第二又再拜稽首叩頭仰三自搏法師頌言上啓太上無極大道三寳尊神原恕施主先世以來下及見身自識事以來實多惡少善多逆少順違天負地觸迕星辰爲臣不能忠於君上爲子不能孝於父母爲婦不能恭於舅姑爲弟妹不能順於兄姊旣以爲人不能有慈愛之心仁篤之行狼戾偏黨瞋喜無常六齋吉日忤犯玄司當其所愛欲令其生值其所憎故令其死撾捍無爲罵詈衝口苟欲自可貪味饕美大小錯互家無法度背德向色遊陶六五好傲蕩凌孤欺寡取非其有心意奢逸言行驕慢凡所施爲動有罪俱不畏鬼神不忌科戒不慮禍惡不量進退不避禁忌不從仁義慳貪嗜得無以爲施責望人報喜作竊盜人中欺劫公行曲枉圖人利益常戲笑人取人長錢與人短數輕秤小升狹幅短度强持與人重秤大斗專以取人假託形勢言則因官自恃凶黠諂誑迷愚心實不清干真喚神掘陵發塜攻劫死魂詐紿借貸取非其財衣非其衣食非其食飲非其飲盜人六畜五果雜菜五榖桑竹枝茂𣗳木貪鄙之性罪彰神明動靜所爲違科犯律莫大之罪尅書右司致令凡家營生不利屢有變怪貧賤困苦孤微凍陋數有亡遺大小不和更相怨恚强健者少病苦者多皆由所犯過惡如是今故爲存亡悔之伏願天尊唯垂原除第三又再拜稽首叩頭仰三自搏法師頌言上啓太上無極大道三寳尊神願降大慈削除臣等先世殃考逮及今身罪嬰自有識以來實夫妻不能相承善事反變惡態旣無清潔之志心嫉意妬隱切爭訟更相憎忌呵男罵女打厲奴婢咄賔叱客絶交鄰里鄉黨不信骨肉不睦六親不和九族不篤繫怒六畜瞋疑妻妾恱和奸朋譆同切友安偷容劫知情羣凶專作呪詛隂爲殘害容媚蠱禱外善内惡嫉賢妬能壅塞高才毀訾英賢折辱良善汙染清潔瑕穢端白咀人之豪憎人之富心常狙獺意懷兇惡舌如錐刀口含毒螫不仁不義無禮無忠自以爲是謂他爲非自矜自誇自是自大積年積歲不能自知詐欺慢誕誣誷返說無誠無信指南作北戾東爲西調戲父母殆折師君不避親䟽不忌所尊岐嚥兩舌鬬亂奸惡阿言䛕語常有爭欺治生販賣專爲誑巧校計銖兩持長作短以醜易好求欲無厭公行不軌私侵忠良輕易四大汙穢三光放癡卑賤馳逐豪彊其心戚戚其意促促千愆積於四司萬過書於五帝積歳累月不可稱數致使凡家常致轗軻所爲不諧學法不聰仙道不成流俗所笑口舌妄生禍變累仍衆庶所憎長吏所欺凡百無吉皆由所犯過惡如是今爲存亡悔之伏願天尊唯垂源除第四又再拜稽首叩頭仰三自搏法師頌曰上啓太上無極大道三寳尊神願捨慈恩原赦齋主先世爰及今身自有知以來實無功受禄無德受賞不能作善笑人作善不能受化謗訕聖教竊盜經書輕穢聖賢背毀反逆叛道入邪敗壞成功快縱逐非見人謬失心口刺譏見賢人而懷瞋覿高才而生嫉愛濫夫憎美士好他之惡恥彼之善不信作惡得惡作罪得罪不知可攺故作不休知不可犯故犯不止借不念歸貸不念償輕虧窮乏說謔愚癡教人作惡勸人爲非居貧室窶不能自責但行怨望强欲他物得便歡喜失便忿怒泄其惡心伺便繫人隂司汙穢身不清潔祼形夜起忤逆星辰呵風罵兩不敬神靈耗亂隂陽憭悷五行減人自益危人自安說人之功爲已之名所爲無可所作不當輕老易小驕慢縱横外不良謹内不慈仁别人九族離人六親南人之父北人之子東人之夫西人之婦乖人之男隔人之女教人墮胎導人落子唯存殺害不重人命心有所恨燒香啓神妄禱百鬼呼天喚地三光神祇呪令其死詛令其亡凶心不善恒生毒念想人婦女憶人精華願念所存思合奸猾不建於功德又無施與之心或學闕明師習無正軌口銜草木心懷沙石或自恃其年高竟弗就於大訓身無一戒妄稱三洞或爲女人形服臭穢不能清潔濫霑尊位道場心攀色境或見人貧悴孤弱倍生憍侮欺誕或飲酒昏醉猖狂迷悶非法妄言干知天時幻惑無度或入宫觀不拜經像或與俗人交渉野合宻行情慾爲四司所奏無善之功五帝所紏有辜之釁致使生縁窮悸觸事不昌恒嬰否頓數遇危難多愁不樂懷憂而行積年無歡歷歲無泰心闇意塞智慮愊懞儜積冥昧六情不啓義理不通所願不果所求不得營事不成仕宦不進生陶六八業不登宅舍不安大小禍患學問不達修道不仙皆由所犯過惡如是今爲凡夫存亡悔之伏願天尊唯垂原除第五又再拜稽首叩頭仰三自搏法師頌言上啓太上無極大道元始天尊三寳尊經伏願至眞瀉澤濳灑原赦凡家九玄七世千曾億祖先亡後化上世以來一切靈神各由先身立行不仁壽早永終後生未長不能具悉作何死亡或頭痛額熱五内恍愡身體凍冷卧牀而死或病苦積年尫羸杖骨歷歲而死或毒治謦嗽吐血脹滿癥結蠱毒鴆藥内爛而死或四肢浮腫瘨癡癕疽流血瘡膿生蟲結癃癖攣跛腕節解落筋脈朽絶而死或聾盲瘖瘂七竅壅塞便曲閉脹榖水不通而死或風癲頭癎鬼魅狂荒反眼吐舌角弓梱張牛呼羊吟犬呻雞鳴投坑越谷不避水火而死或臨兵蹈刀刀劒所斫矛㦸所剌弓弩所射割屍斷頭形骸剥截而死或爲蛇蝮蜂螫鷹狸犲狼龍虎牛馬犬猪齧嚼觝踏而死或登峻緣木㝷橋沈舟乘馬駕車從高墮下沈溺摧折而死或遭偷行偷遭劫行劫道路伏賊鬬變打捍被敵路側而死或被官私威勢猛臨而死或死非其鄕亡非其域血流途道膏腴草水流寄他方客旅而死或遭荒遇亂絶粮飢餓逢寒值熱乏渴而死或偏枯不仁癩病惡疾面目瘡痍鼻崩耳缺棄逮窮鄉捐放邊裔而死或爲惡人所棒麤夫所敺皮膚胷心刀刺屍傷破骨肢節踤跌目瞎齒折五臟瘀熱而死或被邪相逮先殃沴氣相鍾厭鬼所殺奄忽而死或吐血噎哽痳痢赤白内堅外結尫萎而死或精液内漏經脈不流五勞七傷顔黃白䵩手足痿疼枯焦而死或遭罪致獄臨刑都市伏法囚刑而死或傷胎落子腥血而死或生男不育生女不長夭折昏盲不覩日月而死或值雷電霹靂而題脊書背誅擊而亡或水没火燒木打石擲土壓淰漂而死或夜軍行提刀負弩氣棘力倦勞苦而死諸如此等雖爲一死而痛各異皆由宿命因縁所致隨運而死旣壽易衰不以道理先身無福不仁之罪身謝三官一旦沈墜幽途魂魄各受宿對囚謫地獄酆都三官六府之中懸頭鎖械足立三刀縁刀山循劒𣗳食火啗炭鑊湯所煑炎火所燒吞氷飲毒拔舌灌口朝笞暮押身體毀爛形骸焦燎魂爽酸楚痛毒激切巳經三掠難得解脫哀哀長夜之中煢煢餓鬼之羣愁苦三途之中抱酷五苦之庭綿歷數劫罪對不赦希活則生途四塞願生則無縁可攀乞死不得長淪罪原永乖同泰餘殃不盡引逮後生惡惡相續咎咎相纏致令愚俗迍否相仍仕宦不能致禄營生不能飽暖男女大小憂苦無泰今爲衆生上世今世先亡後死首悔斯苦不仁之罪不善之愆元逆之過違和負順迕天逆地觸忤靈神輕犯科法所行不軌罪髙山嶽過積海淵致使先亡後死不以道理千病萬痛十苦百疾毒傷而亡皆先身不仁之對特乞大慈賜以矜原隨亡者死時所由絶命之所解脫窮魂拔度苦魄得逺北酆三官逮役去免九幽昇上天堂淨鬼之林無爲之鄕斷絶復連利祐子孫宅舍安吉胤嗣完全凶神惡魔不得妄忤天覆地載神明護助學道得道求仙得仙富貴長保安樂自然於是主人再拜叩頭稱受道恩太上洞玄靈寳宣戒首悔衆罪保護經卷中
