front:
  text: 太上洞玄靈寶宣戒首悔衆罪保護經卷下太上道君告天師道陵曰此首悔之法升玄品經為道德之籬落是至真之垣牆生死之津乘兆庶之橋梁立身之福田功業之淵場養性之生途修至真之仙方解罪犯之大法修行之首宗極生之上善拔死之第一消災之真科散禍之祕術安國之弘教寧家之肅約為學之智慧希善之富博治病之良方救疾之善藥神明之樞機萬病之扁鵲無上至真大道洪範弘敷世教濟度無涯頌之解過則千罪氷消萬過雪散誦之救死則苦魂冤魄永去荼炭解脫五苦超拔八難神登道舍淨鬼之林上遊玄都之墟下晏昆闕之場存亡俱濟福利日昌誦之求哀則殃流絶逮宿咎消滅生者獲福常處安吉死籍削除於右宮生録注簡於左契於是修經行道長齋苦行安神定志丹誠念道歸心無上正真之庭宗升玄內教真經無上統天畢契之録佩身為寶則坐待雲駕超騰太空上謁虛皇逍遙玉京子當寶祕依法施行建功滅過如響應聲修善禍自殄建功福自生譬如鑒鏡曲直隨形奉法當盡心敬師當竭誠心盡神明知竭誠至理精如此不懈怠升仙克長生叮嚀告萬兆汝當宣是經是經衆法祖無上之至靈供養必得道控雲登玉清妙哉至真文宗者善敬聽太上道君告天師曰若有賢男子及有善婦女欲修身奉法專心持戒營生求仙好道樂經改心易行返悔過惡丹苦一意至誠無疑欲求長生老夀神仙度世脫災免苦去離患難輪轉善場常與福俱生則安樂死則蟬蛻學道得道白日升天存亡終始齊光日月解脫憂苦常懷歡恱所作過惡皆當悔之悔過之法當盡輸誠一切歸實不當隱蔽益子之罪天師唯唯敬受戒言太上道君告天師曰善男子善女人若欲長為種民保夀延年千載之後身能變化長處神州不遷荒域常在有道之國恆生孝慈之門不墮無德之處不生邊國之鄉去離痛癢與福相傳與善相隨不與禽獸同類不與惡鬼為隸容姿麗好身無癡癭聰明洞徹慧為智宗者存亡所犯千罪萬過眥當悔之一切歸實不當隱蔽益子之罪天師唯唯敬受戒言太上道君告天師曰善男子善女人若欲治病療疾消災拔命救死護生處世無憂所為即成所願即至宅舍清隱田蠶倍收興生有利為衆所愛長吏所敬子孫昌熾富貴榮顯無不獲吉無不安寧所願從心所念順志修經求道願見真君者所犯過惡眥當悔之悔過之法唯在欵實遣情送心必令上聞虛皇道眼自鑒爾心有隱益罪道不虛言天師唯唯敬受戒言太上道君告天師曰善男子善女人若欲知宿世之所在存亡之苦樂欲得知為善得善種福得福樹恩施惠立功補過憶識宿命之所行非及我身覺悟罪福善惡之對知有今身從先身來轉生入死輪死入生因其所因因不絶因緣其所緣緣不絶緣得有今日立我之身憶知此巳思建善業唯恐我身更受後身不得如今而我此身又恐此身後生之所不得明識或失人道不如今身唯恃今身廣作福田能如是者得願如此若欲不復貧窮下賤欲不復孤寡衰微欲不復寒凍飢餓欲不復乞丐賣煦欲不復災害病患欲不復耳聾目暝欲不復癡愚邪見欲不復枉遭縣官欲不復為奴婢倅侍欲不復讒諛所橫欲長與聖賢相遇欲與明師寶經相連欲與真人仙人相逢欲與善人福人德人教訓相值欲令仙道成就者所犯過惡皆當悔之悔過之法皆當丹盡委曲首謝不得藏重首輕益子之罪科威嚴峻道不虛言天師唯唯敬受戒言太上道君告天師曰善男子善女人欲令先世無餘基債曩愆昔考宿罪久過欲令今世無相負纍初罪新嬰考違謫負目前深咎欲令三曾五祖九玄七世皆使解脫三途悉令逺離五苦欲令後生子孫揚穗大小昌熾四體完具年命夀老處水不寒入火不熱不痛不癢不飢不渴欲令百怪不能駭百禍不能害龍潛鳳舉出入不可制者所犯過惡皆當悔之悔過之法唯在丹欵首謝曲盡則惡無不除過無不原踈慢不恭益子之罪道不虛言子愼之焉天師唯唯敬受戒言太上道君曰若有君臣父子兄弟夫婦大家奴婢各欲悔過者皆當為師設禮叩頭自搏整身自檢清肅恭敬專心正念奉承教命法師當於高座上為講誦首悔之文若於靜室壇堂亦可隨時轉經行道夫道無為窈窈冥冥視之不見聽之無聲凡人心至感知人情見不假目聽不假耳故謂神明把握至法制御羣情布教施戒以遺愚民師為首悔其罪即原遂事不攺其罪益深人貴能及道貴能微朝過夕改聖人所稱故人作善者為治地也守法戒者為耕犂也布施惠者為植種也悔罪過者為鋤鏺也修清淨者為生榮苗也受經文者猶得雨澤也建齋直者如稼穡滋秀也道德成者猶如收斂也能宣傳法教廣度天人拯拔存亡救恤窮厄治護疾病者猶如開倉施貧飯飢飲渴令衆得飽而身自足無乏少也轉經首悔然後獲福亦復如是所謂福田也所謂善業也是以此經此法功德無上國主悔過天災為除賢臣悔過地害為消慈父悔過家無妖怪孝子悔過凶禍為止仁兄悔過家離殃咎順弟悔過門無怨怒廉夫悔過口舌不起貞婦悔過保宜子孫是男悔過和睦家里是女悔過婚姻通理丈夫悔過不乏所使奴婢悔過得免驅恥道士悔過三官不羈養性悔過絶榖不危修仙悔過白日登霞為居悔過福覆一家為國悔過九州平和悔過之功其道高重罪福立彰子知不乎天師再拜上白天尊教戒委備輒請奉宣臣道陵願令天下之人皆得心開意解知為悔過得免其罪故致家國太平安樂長生久壽臣願天尊當以道力餘哺施與未及者令知作善得善作福得福如種五榖收穫計其利潤百千萬倍諸有未悔者願今奉化諸未升度者願令濟拔諸未得道者願令登仙諸未應生者願令長延臣之微願因由天尊若不垂慈衆生沈墜為罪造殃恐更日甚今發劣言願重開示太上道君答天師曰子之所言善哉要乎夫過惡者是凡之務謂世俗之人去聖久逺大化淪薄濁氣浮厚智慧淺末不識禍福謬誤迷惑不自覺知冒罪觸法不知所由故吐經戒以示不悟教之反悔令除過咎也使盲者朗然開明剛強者令反柔弱反凶為吉轉禍為福導之以生津化之以真道而人知不可作故作知不可為故為今日悔明日犯其性不攺其惡不止禍至乃閉門罪定方憂恐鎖訖方求解縛畢方希脫病重方自治臨死方望活氣盡方求益命絶方求續至爾之時天不及護神不能生鬼不能活雖遇聖賢神德之人災不為散病不為療王父不能挺其命王母不能延其壽凡欲建福必在禍先積功纍德必未萌之前譬若春種秋望其實臨飢耕田不解於飢臨渴穿井不救卒乏消禍莫若營福積功莫若修身營福修身幸宜殷勤道德之門自開凶惡之户自塞福起十方殃滅九隂若無善功植在禍先者則臨命將危傾財竭産叩頭師門稽首德宇豈得免乎皇天雖高其聽甚卑凡人身中常有伺過之神隨時上下白人善惡過滿百二十為一刻刻者令人多衰少利百八十過為一耗耗者令人六畜傷損三百六十過為一漏漏者令人喜發疾病五百四十過為一凶凶者令人瘖啞聾盲一千八十過為一禍禍者令人𣊻殘死亡千二百過為一殘殘者出凶逆亂之人千三百過為一咎咎者令人絶嗣無子千四百四十過為一罪罪者殃流於五世癭痾大禍所縛千六百二十過為一謫謫者令人斷胤無嗣千八百過為一患患者主為奴婢家內耗亂千九百八十過為一橫橫者家出癲癎狂癡之子二千一百六十過為一𣊻𣊻者家出反逆父子兄弟自相攻伐出邪巫鬼異妄説神教二千六百九十過為一災災者家出骨肉內淫亂勃生育非真三千六百過為一異異者家出青盲癃殘三千二百四十過為一變變者家出詔獄死族被誅三千四百二十過為一怪怪者家出乞丐都市刑人死不以埋骸骨損棄無人收拾三千六百過為一刻滿刻滿則定死魂神漂浪隨考輕重付與三途五苦淪溺備艱辛苦痛毒不可堪忍訟對生人雖言空虛曠蕩斯則法律孱然今以告於子子當寶祕宣傳太上道君又重言曰人生或年二十三十而三刻滿則致凶殘或五十六十而三刻滿則致凶殘年小來有過而殘命者受其先世餘過也或接行惡逆竟年夀而不遇患者受其先世餘慶也故積德之後有其餘福積惡之後有其餘禍故人能悔過者上天鑒之為人却刻一悔過即為却三刻三悔過即為却九刻而復後犯不止罪應定死故人欲消災散𣊻治病療疾當漸以歲月思愆自責攺悔過罪誠能行之出自至心感激恐怖墮泣流汗天知至誠地神申信行之一日其人身中伺過之神為人上除一刻行之百日上除二刻行之一歲上除三刻行之三年其福自應不思返悔其過日增其禍益深小過止其身大過流子孫善男子善女人能請經師到宅建立齋直燒香行道或一日一夕或三日三夕勤心苦誠日夕六時讀誦此升玄悔過之文功感諸天真神降房玄司除刻罪過蒙原積善如梁上塵積惡如突中煙可不慎哉可不慎哉天師稽首再拜奉行天師曰無上登天升玄畢契末受方素契積年者不得便佩此契慎之
