body:
  text: 內教無上登天畢劵契儀太上靈寶升玄內教宣戒首悔衆罪保護生緣品無上登天畢劵傳合真之人都統三洞三萬六千六百六十畢事契令弟子何泰句凝寂等依科齎信上金九兩白銀十二兩五綵紋繒五匹信錢二萬四千詣升玄法師邊奉受身佩修行積年並有靈應真神三元安鎮丹田神男玉女侍衛左右法傳應為升玄內仙之人某州某縣道士某今太歲某年某月某日傳道士某觀前巳受方素七十二字契盟並巳經年誠積功著翹勤無懈諸天所悉大聖所鑒三官死名久以削滅應備上仙升玄品中依法奉受以為身寶惠舟自引三天為證九地為盟九盟為保神明為任誓不違科犯戒冒法觸律一旦愆失身謝三官死為下鬼長失人道永充囚役明謹無過定仙天府生死得道不羈地官一如靈寶升玄內教無上登天契之律令天師曰諸是學仙道士不受首悔之法則罪結無復解時皆當悔過升玄內教無上尊經燒香供養并佩方素七十二字及無上大籙修行經年然後能得此無上登天畢契法不傳始學者也若違科犯約則不得便受升玄弟子首悔之經也兆等受經之身慎之愼之天師曰受此畢劵不得妄傳并此經要須奉行精鍊畢訖間解道意信心無疑欲成其道欲除其過乃以此契及弟子以經付之也若心不達取自我見中心懷疑信此浮好乖彼真實有如此之人必躓地獄下鬼不得便以登天之書傳與流俗行尸之輩故以相告愼之愼之太上洞玄靈寶宣戒首悔衆罪保護經卷下
